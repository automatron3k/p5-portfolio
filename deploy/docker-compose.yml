# Sirve el repo de sketches como estático, aislado del stack Supabase.
# Se une a la red supabase_default para que caddy-container lo alcance por nombre
# (reverse_proxy p5js-web:80). No expone puertos al host.
#
# Deploy en VM:
#   cd /opt/p5js
#   docker compose -f deploy/docker-compose.yml up -d
services:
  p5js-web:
    image: nginx:alpine
    container_name: p5js-web
    restart: unless-stopped
    networks:
      - supabase
    volumes:
      - /opt/p5js:/usr/share/nginx/html:ro

networks:
  supabase:
    external: true
    name: supabase_default
